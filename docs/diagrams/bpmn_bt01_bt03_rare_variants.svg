<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 560" width="1500" height="560">
  <title>BPMN Bank20 - standard and variants (P03, P04, P17)</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>

  <text x="750" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">
    BPMN Bank20 - luong chuan va bien the tu process catalog
  </text>
  <text x="750" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">
    Minh hoa hoan toan theo bank20: Chuan P03, Bien the P04, Bien the P17, va cap trung luong P03 ~ P12.
  </text>

  <!-- Row 1: Standard P03 -->
  <rect x="24" y="80" width="1452" height="126" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="42" y="104" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0f766e">Chuan - P03 (LEND_COLL)</text>
  <text x="1408" y="104" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#475569">LoanApplicationProcessing -> CustomerIdentification -> CreditScoring -> CreditApproval -> CollateralValuation -> Disbursement</text>
  <circle cx="72" cy="146" r="12" fill="#fff" stroke="#1f2937" stroke-width="2"/>
  <line x1="84" y1="146" x2="106" y2="146" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <g font-family="Arial, sans-serif" font-size="11" fill="#111827">
    <rect x="106" y="118" width="166" height="56" rx="7" fill="#e2e8f0" stroke="#334155"/><text x="189" y="144" text-anchor="middle">LoanApplicationProcessing</text>
    <line x1="272" y1="146" x2="294" y2="146" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="294" y="118" width="152" height="56" rx="7" fill="#e2e8f0" stroke="#334155"/><text x="370" y="144" text-anchor="middle">CustomerIdentification</text>
    <line x1="446" y1="146" x2="468" y2="146" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="468" y="118" width="116" height="56" rx="7" fill="#dbeafe" stroke="#1d4ed8"/><text x="526" y="144" text-anchor="middle">CreditScoring</text>
    <line x1="584" y1="146" x2="606" y2="146" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="606" y="118" width="116" height="56" rx="7" fill="#e2e8f0" stroke="#334155"/><text x="664" y="144" text-anchor="middle">CreditApproval</text>
    <line x1="722" y1="146" x2="744" y2="146" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="744" y="118" width="130" height="56" rx="7" fill="#dcfce7" stroke="#166534"/><text x="809" y="144" text-anchor="middle">CollateralValuation</text>
    <line x1="874" y1="146" x2="896" y2="146" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="896" y="118" width="114" height="56" rx="7" fill="#fee2e2" stroke="#991b1b"/><text x="953" y="144" text-anchor="middle">Disbursement</text>
  </g>
  <line x1="1010" y1="146" x2="1032" y2="146" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="1048" cy="146" r="12" fill="#fff" stroke="#1f2937" stroke-width="2"/>
  <circle cx="1048" cy="146" r="8" fill="none" stroke="#1f2937" stroke-width="2"/>

  <!-- Row 2: Variant P04 -->
  <rect x="24" y="220" width="1452" height="126" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="42" y="244" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#9a3412">Bien the A - P04 (LEND_NOCOLL)</text>
  <text x="1408" y="244" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#9a3412">Khac biet: bo CollateralValuation (ngan hon P03 1 buoc)</text>
  <circle cx="72" cy="286" r="12" fill="#fff" stroke="#1f2937" stroke-width="2"/>
  <line x1="84" y1="286" x2="106" y2="286" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <g font-family="Arial, sans-serif" font-size="11" fill="#111827">
    <rect x="106" y="258" width="166" height="56" rx="7" fill="#e2e8f0" stroke="#334155"/><text x="189" y="284" text-anchor="middle">LoanApplicationProcessing</text>
    <line x1="272" y1="286" x2="294" y2="286" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="294" y="258" width="152" height="56" rx="7" fill="#e2e8f0" stroke="#334155"/><text x="370" y="284" text-anchor="middle">CustomerIdentification</text>
    <line x1="446" y1="286" x2="468" y2="286" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="468" y="258" width="116" height="56" rx="7" fill="#dbeafe" stroke="#1d4ed8"/><text x="526" y="284" text-anchor="middle">CreditScoring</text>
    <line x1="584" y1="286" x2="606" y2="286" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="606" y="258" width="116" height="56" rx="7" fill="#e2e8f0" stroke="#334155"/><text x="664" y="284" text-anchor="middle">CreditApproval</text>
    <line x1="722" y1="286" x2="744" y2="286" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="744" y="258" width="114" height="56" rx="7" fill="#fee2e2" stroke="#991b1b"/><text x="801" y="284" text-anchor="middle">Disbursement</text>
  </g>
  <line x1="858" y1="286" x2="880" y2="286" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="896" cy="286" r="12" fill="#fff" stroke="#1f2937" stroke-width="2"/>
  <circle cx="896" cy="286" r="8" fill="none" stroke="#1f2937" stroke-width="2"/>

  <!-- Row 3: Variant P17 -->
  <rect x="24" y="360" width="1452" height="126" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="42" y="384" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#9a3412">Bien the B - P17 (LEND_RESCORE)</text>
  <text x="1408" y="384" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#9a3412">Khac biet: lap CreditScoring 2 lan</text>
  <circle cx="72" cy="426" r="12" fill="#fff" stroke="#1f2937" stroke-width="2"/>
  <line x1="84" y1="426" x2="106" y2="426" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <g font-family="Arial, sans-serif" font-size="11" fill="#111827">
    <rect x="106" y="398" width="166" height="56" rx="7" fill="#e2e8f0" stroke="#334155"/><text x="189" y="424" text-anchor="middle">LoanApplicationProcessing</text>
    <line x1="272" y1="426" x2="294" y2="426" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="294" y="398" width="152" height="56" rx="7" fill="#e2e8f0" stroke="#334155"/><text x="370" y="424" text-anchor="middle">CustomerIdentification</text>
    <line x1="446" y1="426" x2="468" y2="426" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="468" y="398" width="116" height="56" rx="7" fill="#dbeafe" stroke="#1d4ed8"/><text x="526" y="424" text-anchor="middle">CreditScoring #1</text>
    <line x1="584" y1="426" x2="606" y2="426" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="606" y="398" width="116" height="56" rx="7" fill="#bfdbfe" stroke="#1d4ed8"/><text x="664" y="424" text-anchor="middle">CreditScoring #2</text>
    <line x1="722" y1="426" x2="744" y2="426" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="744" y="398" width="116" height="56" rx="7" fill="#e2e8f0" stroke="#334155"/><text x="802" y="424" text-anchor="middle">CreditApproval</text>
    <line x1="860" y1="426" x2="882" y2="426" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="882" y="398" width="114" height="56" rx="7" fill="#fee2e2" stroke="#991b1b"/><text x="939" y="424" text-anchor="middle">Disbursement</text>
  </g>
  <line x1="996" y1="426" x2="1018" y2="426" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="1034" cy="426" r="12" fill="#fff" stroke="#1f2937" stroke-width="2"/>
  <circle cx="1034" cy="426" r="8" fill="none" stroke="#1f2937" stroke-width="2"/>

  <!-- right legend -->
  <rect x="1094" y="120" width="372" height="350" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1110" y="146" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#0f172a">Ghi chu bank20-only</text>
  <text x="1110" y="172" font-family="Arial, sans-serif" font-size="11" fill="#111827">- Luong chuan minh hoa: P03 (LEND_COLL)</text>
  <text x="1110" y="194" font-family="Arial, sans-serif" font-size="11" fill="#111827">- Bien the A: P04 bo CollateralValuation</text>
  <text x="1110" y="216" font-family="Arial, sans-serif" font-size="11" fill="#111827">- Bien the B: P17 lap CreditScoring 2 lan</text>
  <text x="1110" y="248" font-family="Arial, sans-serif" font-size="11" fill="#166534">- Step xanh la buoc khac biet/chen them</text>
  <text x="1110" y="270" font-family="Arial, sans-serif" font-size="11" fill="#1d4ed8">- Step xanh duong dam = bien the cham diem lap</text>
  <text x="1110" y="302" font-family="Arial, sans-serif" font-size="11" fill="#334155">Cap process trung luong trong catalog:</text>
  <text x="1110" y="324" font-family="Arial, sans-serif" font-size="11" fill="#334155">P03 ~ P12, P01 ~ P14, P06 ~ P13</text>
  <text x="1110" y="356" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Nguon: data/bank20_process_catalog.csv</text>
</svg>
