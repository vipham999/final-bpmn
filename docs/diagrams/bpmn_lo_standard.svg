<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 200" width="980" height="200">
  <title>BPMN - Loan Origination (standard flow)</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="490" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#222">
    BPMN 2.0 - Loan Origination (happy path)
  </text>

  <circle cx="42" cy="110" r="14" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="42" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Start</text>
  <line x1="56" y1="110" x2="78" y2="110" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g font-family="Arial, sans-serif" font-size="11" fill="#111">
    <rect x="78" y="82" width="118" height="56" rx="6" ry="6" fill="#e8f4fc" stroke="#1565c0" stroke-width="1.5"/>
    <text x="137" y="108" text-anchor="middle">LoanApplication</text>
    <text x="137" y="124" text-anchor="middle" font-size="9" fill="#444">(Task)</text>
    <line x1="196" y1="110" x2="218" y2="110" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="218" y="82" width="72" height="56" rx="6" ry="6" fill="#e8f4fc" stroke="#1565c0" stroke-width="1.5"/>
    <text x="254" y="114" text-anchor="middle">KYC</text>
    <line x1="290" y1="110" x2="312" y2="110" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="312" y="82" width="118" height="56" rx="6" ry="6" fill="#e8f4fc" stroke="#1565c0" stroke-width="1.5"/>
    <text x="371" y="108" text-anchor="middle">CreditScoring</text>
    <text x="371" y="124" text-anchor="middle" font-size="9" fill="#444">(Task)</text>
    <line x1="430" y1="110" x2="452" y2="110" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="452" y="82" width="128" height="56" rx="6" ry="6" fill="#e8f4fc" stroke="#1565c0" stroke-width="1.5"/>
    <text x="516" y="108" text-anchor="middle">CreditApproval</text>
    <text x="516" y="124" text-anchor="middle" font-size="9" fill="#444">(Task)</text>
    <line x1="580" y1="110" x2="602" y2="110" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="602" y="82" width="118" height="56" rx="6" ry="6" fill="#e8f4fc" stroke="#1565c0" stroke-width="1.5"/>
    <text x="661" y="108" text-anchor="middle">Disbursement</text>
    <text x="661" y="124" text-anchor="middle" font-size="9" fill="#444">(Task)</text>
    <line x1="720" y1="110" x2="742" y2="110" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <circle cx="758" cy="110" r="14" fill="#fff" stroke="#222" stroke-width="2"/>
  <circle cx="758" cy="110" r="9" fill="none" stroke="#222" stroke-width="2"/>
  <text x="758" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">End</text>
</svg>
