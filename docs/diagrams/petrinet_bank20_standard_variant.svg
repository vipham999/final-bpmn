<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340">
  <title>Petri net Bank20 - standard and variant comparison</title>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="640" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">
    Petri net Bank20 - so sanh luong chuan va bien the
  </text>
  <text x="640" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">
    Nhanh gon: nhanh tren = P03 (co CollateralValuation), nhanh duoi = P04 (bo buoc nay)
  </text>

  <!-- shared start -->
  <circle cx="54" cy="176" r="12" fill="#fff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="54" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#b91c1c">1</text>
  <text x="54" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">p0</text>
  <line x1="66" y1="176" x2="94" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="94" y="152" width="136" height="48" rx="2" fill="#fff7ed" stroke="#c2410c" stroke-width="1.8"/>
  <text x="162" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">LoanApplicationProcessing</text>
  <line x1="230" y1="176" x2="252" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="266" cy="176" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <line x1="276" y1="176" x2="304" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="304" y="152" width="126" height="48" rx="2" fill="#fff7ed" stroke="#c2410c" stroke-width="1.8"/>
  <text x="367" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CustomerIdentification</text>
  <line x1="430" y1="176" x2="452" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="466" cy="176" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>

  <!-- split -->
  <line x1="476" y1="176" x2="520" y2="118" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="476" y1="176" x2="520" y2="234" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- top branch standard -->
  <text x="558" y="96" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#0f766e">Nhanh tren: Chuan P03</text>
  <rect x="520" y="94" width="104" height="48" rx="2" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.8"/>
  <text x="572" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CreditScoring</text>
  <line x1="624" y1="118" x2="646" y2="118" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="660" cy="118" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <line x1="670" y1="118" x2="698" y2="118" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="698" y="94" width="104" height="48" rx="2" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.8"/>
  <text x="750" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CreditApproval</text>
  <line x1="802" y1="118" x2="824" y2="118" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="838" cy="118" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <line x1="848" y1="118" x2="876" y2="118" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="876" y="94" width="122" height="48" rx="2" fill="#dcfce7" stroke="#166534" stroke-width="1.8"/>
  <text x="937" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CollateralValuation</text>

  <!-- bottom branch variant -->
  <text x="556" y="262" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#9a3412">Nhanh duoi: Bien the P04</text>
  <rect x="520" y="210" width="104" height="48" rx="2" fill="#ffedd5" stroke="#c2410c" stroke-width="1.8"/>
  <text x="572" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CreditScoring</text>
  <line x1="624" y1="234" x2="646" y2="234" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="660" cy="234" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <line x1="670" y1="234" x2="698" y2="234" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="698" y="210" width="104" height="48" rx="2" fill="#ffedd5" stroke="#c2410c" stroke-width="1.8"/>
  <text x="750" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CreditApproval</text>

  <!-- merge and end -->
  <line x1="998" y1="118" x2="1040" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="802" y1="234" x2="1040" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="1054" cy="176" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <line x1="1064" y1="176" x2="1092" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="1092" y="152" width="108" height="48" rx="2" fill="#fee2e2" stroke="#991b1b" stroke-width="1.8"/>
  <text x="1146" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Disbursement</text>
  <line x1="1200" y1="176" x2="1222" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="1236" cy="176" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="1236" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">p_end</text>
</svg>
