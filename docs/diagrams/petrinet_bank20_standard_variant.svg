<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340">
  <title>Petri net Bank20 - standard and variant comparison</title>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="640" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">
    Petri net Bank20 - so sanh luong chuan va bien the
  </text>
  <text x="640" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">
    Nhanh gon: nhanh tren = P03 (co CollateralValuation), nhanh duoi = P04 (bo buoc nay)
  </text>

  <!-- shared start -->
  <circle cx="54" cy="176" r="12" fill="#fff" stroke="#b91c1c" stroke-width="2.5"/>
  <text x="54" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#b91c1c">1</text>
  <text x="54" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">p0</text>
  <line x1="66" y1="176" x2="94" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="94" y="152" width="180" height="48" rx="2" fill="#fff7ed" stroke="#c2410c" stroke-width="1.8"/>
  <text x="184" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">LoanApplicationProcessing</text>
  <line x1="274" y1="176" x2="296" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="310" cy="176" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <line x1="320" y1="176" x2="348" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="348" y="152" width="170" height="48" rx="2" fill="#fff7ed" stroke="#c2410c" stroke-width="1.8"/>
  <text x="433" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CustomerIdentification</text>
  <line x1="518" y1="176" x2="540" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="554" cy="176" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>

  <!-- split -->
  <line x1="564" y1="176" x2="610" y2="118" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="564" y1="176" x2="610" y2="234" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- top branch standard -->
  <text x="648" y="78" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#0f766e">Nhanh tren: Chuan P03</text>
  <rect x="610" y="94" width="104" height="48" rx="2" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.8"/>
  <text x="662" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CreditScoring</text>
  <line x1="714" y1="118" x2="736" y2="118" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="750" cy="118" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <line x1="760" y1="118" x2="788" y2="118" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="788" y="94" width="104" height="48" rx="2" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.8"/>
  <text x="840" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CreditApproval</text>
  <line x1="892" y1="118" x2="914" y2="118" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="928" cy="118" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <line x1="938" y1="118" x2="966" y2="118" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="966" y="94" width="122" height="48" rx="2" fill="#dcfce7" stroke="#166534" stroke-width="1.8"/>
  <text x="1027" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CollateralValuation</text>

  <!-- bottom branch variant -->
  <text x="646" y="286" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#9a3412">Nhanh duoi: Bien the P04</text>
  <rect x="610" y="210" width="104" height="48" rx="2" fill="#ffedd5" stroke="#c2410c" stroke-width="1.8"/>
  <text x="662" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CreditScoring</text>
  <line x1="714" y1="234" x2="736" y2="234" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="750" cy="234" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <line x1="760" y1="234" x2="788" y2="234" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="788" y="210" width="104" height="48" rx="2" fill="#ffedd5" stroke="#c2410c" stroke-width="1.8"/>
  <text x="840" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">CreditApproval</text>

  <!-- merge and end -->
  <line x1="1027" y1="142" x2="1044" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <line x1="892" y1="234" x2="1044" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="1054" cy="176" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <line x1="1064" y1="176" x2="1092" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <rect x="1092" y="152" width="108" height="48" rx="2" fill="#fee2e2" stroke="#991b1b" stroke-width="1.8"/>
  <text x="1146" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Disbursement</text>
  <line x1="1200" y1="176" x2="1222" y2="176" stroke="#334155" stroke-width="1.4" marker-end="url(#a)"/>
  <circle cx="1236" cy="176" r="10" fill="#fff" stroke="#334155" stroke-width="2"/>
  <text x="1236" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">p_end</text>
