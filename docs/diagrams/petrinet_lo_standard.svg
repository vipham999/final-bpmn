<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" width="920" height="220">
  <title>Petri net - Loan Origination (workflow net)</title>
  <defs>
    <marker id="pn-arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#333"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="460" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#222">
    Petri net (workflow net) - same LO standard flow
  </text>
  <text x="460" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">
    Circle = place (state), rectangle = transition (activity), token at p0 = one running case.
  </text>

  <g font-family="Arial, sans-serif" font-size="10" fill="#333">
    <circle cx="40" cy="120" r="12" fill="#fff" stroke="#c62828" stroke-width="2.5"/>
    <text x="40" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#c62828">1</text>
    <text x="40" y="152" text-anchor="middle" fill="#666">p0</text>
    <line x1="52" y1="120" x2="78" y2="120" stroke="#333" stroke-width="1.2" marker-end="url(#pn-arrow)"/>

    <rect x="78" y="98" width="100" height="44" rx="2" fill="#fff7e6" stroke="#e65100" stroke-width="1.8"/>
    <text x="128" y="118" text-anchor="middle">LoanApplication</text>
    <text x="128" y="132" text-anchor="middle" font-size="9" fill="#666">transition</text>
    <line x1="178" y1="120" x2="198" y2="120" stroke="#333" stroke-width="1.2" marker-end="url(#pn-arrow)"/>

    <circle cx="210" cy="120" r="10" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="210" y="152" text-anchor="middle" fill="#666">p1</text>
    <line x1="220" y1="120" x2="248" y2="120" stroke="#333" stroke-width="1.2" marker-end="url(#pn-arrow)"/>

    <rect x="248" y="98" width="56" height="44" rx="2" fill="#fff7e6" stroke="#e65100" stroke-width="1.8"/>
    <text x="276" y="124" text-anchor="middle">KYC</text>
    <line x1="304" y1="120" x2="322" y2="120" stroke="#333" stroke-width="1.2" marker-end="url(#pn-arrow)"/>

    <circle cx="334" cy="120" r="10" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="334" y="152" text-anchor="middle" fill="#666">p2</text>
    <line x1="344" y1="120" x2="372" y2="120" stroke="#333" stroke-width="1.2" marker-end="url(#pn-arrow)"/>

    <rect x="372" y="98" width="100" height="44" rx="2" fill="#fff7e6" stroke="#e65100" stroke-width="1.8"/>
    <text x="422" y="118" text-anchor="middle">CreditScoring</text>
    <text x="422" y="132" text-anchor="middle" font-size="9" fill="#666">transition</text>
    <line x1="472" y1="120" x2="490" y2="120" stroke="#333" stroke-width="1.2" marker-end="url(#pn-arrow)"/>

    <circle cx="502" cy="120" r="10" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="502" y="152" text-anchor="middle" fill="#666">p3</text>
    <line x1="512" y1="120" x2="540" y2="120" stroke="#333" stroke-width="1.2" marker-end="url(#pn-arrow)"/>

    <rect x="540" y="98" width="108" height="44" rx="2" fill="#fff7e6" stroke="#e65100" stroke-width="1.8"/>
    <text x="594" y="118" text-anchor="middle">CreditApproval</text>
    <text x="594" y="132" text-anchor="middle" font-size="9" fill="#666">transition</text>
    <line x1="648" y1="120" x2="666" y2="120" stroke="#333" stroke-width="1.2" marker-end="url(#pn-arrow)"/>

    <circle cx="678" cy="120" r="10" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="678" y="152" text-anchor="middle" fill="#666">p4</text>
    <line x1="688" y1="120" x2="716" y2="120" stroke="#333" stroke-width="1.2" marker-end="url(#pn-arrow)"/>

    <rect x="716" y="98" width="100" height="44" rx="2" fill="#fff7e6" stroke="#e65100" stroke-width="1.8"/>
    <text x="766" y="118" text-anchor="middle">Disbursement</text>
    <text x="766" y="132" text-anchor="middle" font-size="9" fill="#666">transition</text>
    <line x1="816" y1="120" x2="834" y2="120" stroke="#333" stroke-width="1.2" marker-end="url(#pn-arrow)"/>

    <circle cx="848" cy="120" r="10" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="848" y="152" text-anchor="middle" fill="#666">p5</text>
  </g>
</svg>
