<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 260" width="1180" height="260">
  <title>BPMN - Bank20 overview and sample flow</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="590" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#222">
    BPMN 2.0 - Bank20 (20 quy trinh) overview
  </text>
  <text x="590" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555">
    So do ben duoi minh hoa luong P01; trong app co the chon P01..P20 de render dong.
  </text>

  <circle cx="50" cy="138" r="14" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="50" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Start</text>
  <line x1="64" y1="138" x2="88" y2="138" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g font-family="Arial, sans-serif" font-size="11" fill="#111">
    <rect x="88" y="108" width="148" height="60" rx="7" fill="#e8f4fc" stroke="#1565c0" stroke-width="1.5"/>
    <text x="162" y="132" text-anchor="middle">CustomerIdentification</text>
    <text x="162" y="148" text-anchor="middle" font-size="9" fill="#444">(Task)</text>
    <line x1="236" y1="138" x2="260" y2="138" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="260" y="108" width="164" height="60" rx="7" fill="#e8f4fc" stroke="#1565c0" stroke-width="1.5"/>
    <text x="342" y="132" text-anchor="middle">RiskProfileAssessment</text>
    <text x="342" y="148" text-anchor="middle" font-size="9" fill="#444">(Task)</text>
    <line x1="424" y1="138" x2="448" y2="138" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="448" y="108" width="126" height="60" rx="7" fill="#e8f4fc" stroke="#1565c0" stroke-width="1.5"/>
    <text x="511" y="132" text-anchor="middle">AccountOpening</text>
    <text x="511" y="148" text-anchor="middle" font-size="9" fill="#444">(Task)</text>
    <line x1="574" y1="138" x2="598" y2="138" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="598" y="108" width="112" height="60" rx="7" fill="#e8f4fc" stroke="#1565c0" stroke-width="1.5"/>
    <text x="654" y="132" text-anchor="middle">CardIssuance</text>
    <text x="654" y="148" text-anchor="middle" font-size="9" fill="#444">(Task)</text>
  </g>

  <line x1="710" y1="138" x2="734" y2="138" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="750" cy="138" r="14" fill="#fff" stroke="#222" stroke-width="2"/>
  <circle cx="750" cy="138" r="9" fill="none" stroke="#222" stroke-width="2"/>
  <text x="750" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">End</text>

  <rect x="790" y="92" width="356" height="104" rx="8" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="968" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#333">Bank20 catalog snapshot</text>
  <text x="810" y="138" font-family="Arial, sans-serif" font-size="11" fill="#333">- 20 process_id (P01..P20)</text>
  <text x="810" y="156" font-family="Arial, sans-serif" font-size="11" fill="#333">- 20 activity vocabulary</text>
  <text x="810" y="174" font-family="Arial, sans-serif" font-size="11" fill="#333">- Mot so quy trinh trung luong (P01/P14, P03/P12, P06/P13)</text>
</svg>
